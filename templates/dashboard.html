<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp AI Bot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        h1 { color: #25D366; text-align: center; margin-bottom: 20px; }
        .stats { display: flex; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px 40px; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .stat-card h2 { font-size: 2rem; color: #25D366; }
        .stat-card p { color: #666; }
        .conversation { background: white; border-radius: 10px; padding: 20px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .conversation .sender { font-weight: bold; color: #25D366; margin-bottom: 8px; }
        .conversation .timestamp { font-size: 0.8rem; color: #999; margin-bottom: 10px; }
        .message-box { background: #f0f2f5; padding: 10px; border-radius: 8px; margin-bottom: 8px; }
        .message-box.user { border-left: 4px solid #25D366; }
        .message-box.ai { border-left: 4px solid #075E54; }
        .label { font-size: 0.75rem; color: #999; margin-bottom: 4px; }
        .refresh { display: block; margin: 0 auto 20px; padding: 10px 30px; background: #25D366; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        .refresh:hover { background: #075E54; }
    </style>
</head>
<body>
    <h1>WhatsApp AI Bot Dashboard</h1>

    <div class="stats">
        <div class="stat-card">
            <h2>{{ total }}</h2>
            <p>Total Messages</p>
        </div>
        <div class="stat-card">
            <h2>{{ unique_senders }}</h2>
            <p>Unique Users</p>
        </div>
    </div>

    <button class="refresh" onclick="location.reload()">🔄 Refresh</button>

    {% for log in logs %}
    <div class="conversation">
        <div class="sender">📱 {{ log.sender }}</div>
        <div class="timestamp">🕐 {{ log.timestamp }}</div>
        <div class="message-box user">
            <div class="label">USER</div>
            {{ log.user_message }}
        </div>
        <div class="message-box ai">
            <div class="label">AI REPLY</div>
            {{ log.ai_reply }}
        </div>
    </div>
    {% endfor %}
</body>
</html>
